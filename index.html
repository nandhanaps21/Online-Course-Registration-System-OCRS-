<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CMRU Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background-color: white;
      padding: 40px;
      border-radius: 10px;
      width: 380px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 { color: #0e8a7a; margin-bottom: 5px; }

    p { color: gray; font-size: 14px; margin-bottom: 20px; }

    label {
      display: block;
      text-align: left;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 11px;
      background-color: #0e8a7a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover { background-color: #0b7066; }

    .error {
      color: red;
      font-size: 13px;
      text-align: left;
      margin-top: -10px;
      margin-bottom: 10px;
      display: none;
    }

    .hint {
      margin-top: 20px;
      background-color: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 6px;
      padding: 12px;
      font-size: 12px;
      color: #92400e;
      text-align: left;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>🏛️ CMR University</h2>
    <p>Sign in to the Academic Portal</p>

    <label>Email</label>
    <input type="text" id="email" placeholder="john.student@cmru.edu.in">

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">

    <div class="error" id="errorMsg"></div>

    <button onclick="doLogin()">Login</button>

    <div class="hint">
      <strong>Email format:</strong> firstname.student@cmru.edu.in<br>
      <strong>Password:</strong> your first name
    </div>
  </div>

  <script>
    function doLogin() {
      var email    = document.getElementById("email").value;
      var password = document.getElementById("password").value;
      var errorMsg = document.getElementById("errorMsg");

      if (email == "") {
        errorMsg.textContent   = "Please enter your email.";
        errorMsg.style.display = "block";
        return;
      }

      if (!email.includes(".student@")) {
        errorMsg.textContent   = "Please enter a valid student email.";
        errorMsg.style.display = "block";
        return;
      }

      var firstName = email.split(".")[0];
      if (password != firstName) {
        errorMsg.textContent   = "Wrong password. Your password is your first name.";
        errorMsg.style.display = "block";
        return;
      }

      errorMsg.style.display = "none";
      localStorage.setItem("username", email);
      localStorage.setItem("role", "student");

      fetch("http://localhost/cmru/register.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: password })
      });

      window.location.href = "http://localhost/cmru/dashboard.html";
    }
  </script>

</body>
</html>
